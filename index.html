
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalesAuditor AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'Menlo', 'Monaco', 'Courier New', 'monospace'],
            },
            colors: {
              slate: {
                850: '#151e2e', 
              }
            },
            animation: {
              'gradient-x': 'gradient-x 15s ease infinite',
              'gradient-y': 'gradient-y 15s ease infinite',
              'gradient-xy': 'gradient-xy 15s ease infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'shimmer': 'shimmer 2s infinite',
            },
            keyframes: {
              'gradient-y': {
                '0%, 100%': {
                  'background-size': '400% 400%',
                  'background-position': 'center top'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'center center'
                }
              },
              'gradient-x': {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                }
              },
              'gradient-xy': {
                '0%, 100%': {
                  'background-size': '400% 400%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                }
              },
              'shake': {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              'shimmer': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' }
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Premium SaaS Easing Curves */
        --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
        --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
        --ease-in-out-smooth: cubic-bezier(0.65, 0, 0.35, 1);
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        transition: background-color 0.6s var(--ease-in-out-smooth), color 0.6s var(--ease-in-out-smooth);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      /* Smooth theme transition for all elements */
      *, *::before, *::after {
        transition-property: background-color, border-color, color, fill, stroke, transform, box-shadow, opacity;
        transition-timing-function: var(--ease-out-quart);
        transition-duration: 300ms;
      }

      /* Premium Card Hover Effect */
      .card-hover {
        transition: transform 0.4s var(--ease-out-expo), box-shadow 0.4s var(--ease-out-expo), border-color 0.3s ease;
        will-change: transform, box-shadow;
      }
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.1);
      }
      .dark .card-hover:hover {
        box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
        border-color: rgba(99, 102, 241, 0.4); /* Indigo hint */
      }

      /* Animated Gradient Text */
      .text-gradient-animated {
        background: linear-gradient(to right, #4f46e5, #ec4899, #8b5cf6, #4f46e5);
        background-size: 300%;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: gradient-text 8s ease infinite;
      }
      
      @keyframes gradient-text {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* Glassmorphism */
      .bg-glass {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }
      .dark .bg-glass {
        background: rgba(15, 23, 42, 0.8);
      }

      /* Custom scrollbar for transcript */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      
      .dark .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #475569;
      }
      .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #64748b;
      }

      /* Refined Animations */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.8s var(--ease-out-expo) forwards;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.6s var(--ease-out-quart) forwards;
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-slide-up {
        animation: slideUp 0.6s var(--ease-out-expo) forwards;
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }
      .animate-scale-in {
        animation: scaleIn 0.5s var(--ease-out-expo) forwards;
      }

      @keyframes logoScale {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .animate-logo-scale {
         animation: logoScale 1.2s var(--ease-out-expo) forwards;
      }
      
      @keyframes logoBreathe {
        0%, 100% { transform: scale(1); filter: brightness(1); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
        50% { transform: scale(1.05); filter: brightness(1.1); box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.25), 0 10px 10px -5px rgba(79, 70, 229, 0.1); }
      }
      .animate-logo-breathe {
        animation: logoBreathe 4s ease-in-out infinite;
      }

      @keyframes circularProgress {
        from { stroke-dashoffset: 351.86; }
      }
      .animate-circular-progress {
        animation: circularProgress 1.5s var(--ease-out-expo) forwards;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .animate-cursor-blink {
        animation: blink 1s step-end infinite;
      }

      /* Stagger Delays Utility */
      .delay-50 { animation-delay: 50ms; }
      .delay-100 { animation-delay: 100ms; }
      .delay-150 { animation-delay: 150ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }
      .delay-400 { animation-delay: 400ms; }
      .delay-500 { animation-delay: 500ms; }

      /* Utilities */
      .bg-grid-pattern {
        background-image: linear-gradient(to right, #e2e8f0 1px, transparent 1px),
                          linear-gradient(to bottom, #e2e8f0 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: linear-gradient(to bottom, transparent, 10%, black, 90%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, transparent, 10%, black, 90%, transparent);
      }
      
      .dark .bg-grid-pattern {
        background-image: linear-gradient(to right, #334155 1px, transparent 1px),
                          linear-gradient(to bottom, #334155 1px, transparent 1px);
        mask-image: linear-gradient(to bottom, transparent, 5%, black, 90%, transparent);
        -webkit-mask-image: linear-gradient(to bottom, transparent, 5%, black, 90%, transparent);
      }
    </style>
